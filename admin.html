<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Vault | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#00f2ff', secondary: '#7000ff', dark: '#050505' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="bg-dark text-white font-sans min-h-screen overflow-x-hidden">
    
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-dark flex items-center justify-center p-6">
        <div class="max-w-md w-full glass p-10 rounded-[40px] text-center">
            <div class="text-primary font-mono mb-4 tracking-widest uppercase text-xs">// AUTH_REQUIRED</div>
            <h1 class="text-4xl font-black mb-8 tracking-tighter">VIBE CHECK<span class="text-primary">.</span></h1>
            <input type="password" id="admin-pass" placeholder="Enter Access Code" class="w-full bg-white/5 border border-white/10 py-4 px-6 rounded-2xl outline-none focus:border-primary transition-all text-center mb-6">
            <button onclick="checkAccess()" class="w-full py-4 bg-primary text-black font-black uppercase tracking-widest rounded-full hover:scale-105 transition-transform">Verify Identity</button>
            <p class="mt-6 text-white/20 text-[10px] uppercase tracking-widest">Hint: The code is "BayMax"</p>
        </div>
    </div>

    <!-- Dashboard Header -->
    <nav class="p-8 md:p-12 flex justify-between items-center border-b border-white/5 glass sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="text-2xl font-black tracking-tighter">VIBE <span class="text-primary">VAULT.</span></div>
            <span class="px-3 py-1 bg-primary/10 text-primary text-[10px] font-mono rounded-full uppercase">Admin v1.0</span>
        </div>
        <div class="flex gap-6">
            <button onclick="clearVault()" class="text-red-400/50 hover:text-red-400 text-[10px] font-bold uppercase tracking-widest transition-colors">Clear Vault</button>
            <button onclick="window.location.href='index.html'" class="text-white/40 hover:text-white text-[10px] font-bold uppercase tracking-widest transition-colors">View Site</button>
            <button onclick="logout()" class="px-5 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-primary text-[10px] font-bold uppercase tracking-widest transition-all">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-8 md:p-12">
        <div class="mb-12">
            <h2 class="text-5xl font-black tracking-tighter mb-2">INCOMING ENQUIRIES</h2>
            <p class="text-white/40 font-mono text-sm tracking-widest" id="stats-line">// 0 TRANSMISSIONS CAPTURED</p>
        </div>

        <div id="enquiry-list" class="grid grid-cols-1 gap-6">
            <!-- Cards will be injected here -->
            <div class="text-center py-40 opacity-20" id="empty-state">
                <div class="text-8xl mb-4 font-black">EMPTY</div>
                <p class="font-mono tracking-widest uppercase">Waiting for the first vibe...</p>
            </div>
        </div>
    </main>

    <!-- Firebase SDK (v8 Compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <script src="admin.js"></script>
</body>
</html>
