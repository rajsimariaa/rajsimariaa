<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Raj Simaria</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body class="admin-body">
    <div id="admin-dashboard" class="admin-dashboard" style="display: none;">
        <div class="admin-sidebar">
            <div class="admin-logo">
                <div class="logo-icon">R</div>
                ADMIN
            </div>
            <nav class="admin-nav">
                <button class="admin-nav-item active" data-target="payments-view">
                    <i data-lucide="coffee"></i> Coffee Payments
                </button>
                <button class="admin-nav-item" data-target="upload-view">
                    <i data-lucide="upload-cloud"></i> Upload Work
                </button>
                <button class="admin-nav-item" data-target="manage-view">
                    <i data-lucide="folder"></i> Manage Work
                </button>
            </nav>
            <button id="logout-btn" class="logout-btn"><i data-lucide="log-out"></i> Logout</button>
        </div>

        <div class="admin-main">
            <!-- Payments View -->
            <div id="payments-view" class="admin-view active">
                <h1 class="view-title">Coffee Payments</h1>
                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Amount (₹)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="payments-tbody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Upload Work View -->
            <div id="upload-view" class="admin-view" style="display: none;">
                <h1 class="view-title">Upload New Work</h1>
                <div class="upload-card">
                    <form id="upload-form" class="admin-form">
                        <div class="form-group">
                            <label>Title of Work</label>
                            <input type="text" id="work-title" class="payment-input w-full" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="work-desc" class="payment-input w-full" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Price (₹)</label>
                            <input type="number" id="work-price" class="payment-input w-full" required>
                        </div>
                        <div class="form-group">
                            <label>File Download Link (Google Drive, Dropbox, etc.)</label>
                            <input type="url" id="work-file-url" class="payment-input w-full" placeholder="https://..."
                                required>
                        </div>
                        <button type="submit" id="upload-btn" class="primary-btn">Add Work</button>
                        <p id="upload-status"></p>
                    </form>
                </div>
            </div>

            <!-- Manage Work View -->
            <div id="manage-view" class="admin-view" style="display: none;">
                <h1 class="view-title">Manage Uploaded Work</h1>
                <div class="works-grid" id="works-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>

</html>
