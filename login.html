<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Raj Simaria</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#030303',
                        card: 'rgba(15, 15, 15, 0.6)',
                        border: 'rgba(255, 255, 255, 0.08)',
                        cyan: {
                            DEFAULT: '#22d3ee',
                            light: '#67e8f9',
                        },
                        fuchsia: {
                            DEFAULT: '#c026d3',
                            light: '#e879f9',
                        },
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
        }
        .glass {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-dark text-white font-outfit antialiased min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <!-- Background -->
    <div class="fixed inset-0 z-[-1] grid-bg"></div>
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-cyan/5 via-transparent to-fuchsia/5 pointer-events-none"></div>

    <div class="w-full max-w-[480px] animate-in fade-in zoom-in duration-700">
        <div class="glass rounded-[3rem] p-10 md:p-14 relative shadow-2xl overflow-hidden group">
            <!-- Glow Effect -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-cyan/10 blur-[80px] rounded-full group-hover:bg-cyan/20 transition-all duration-700"></div>
            
            <div class="relative z-10">
                <div class="mb-12 text-center">
                    <a href="index.html" class="inline-flex items-center gap-2 text-3xl font-black tracking-tighter mb-8 no-underline text-white group/logo">
                        <span class="text-cyan group-hover/logo:text-fuchsia transition-colors duration-500">>_</span>
                        RAJ<span class="text-cyan">.</span>
                    </a>
                    <h1 id="auth-title" class="text-4xl font-black tracking-tight mb-3">Welcome Back</h1>
                    <p id="auth-desc" class="text-slate-400 font-medium">Identify yourself to access the portal</p>
                </div>

                <div id="error-msg" class="hidden text-red-400 bg-red-400/10 p-4 rounded-2xl text-xs font-bold mb-8 border border-red-400/20 text-center"></div>
                <div id="success-msg" class="hidden text-emerald-400 bg-emerald-400/10 p-4 rounded-2xl text-xs font-bold mb-8 border border-emerald-400/20 text-center"></div>

                <form id="auth-form" class="flex flex-col gap-5">
                    <div class="space-y-4">
                        <div class="relative group/input">
                            <i data-lucide="mail" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within/input:text-cyan transition-colors"></i>
                            <input type="email" id="email" placeholder="Email Address" required
                                class="bg-white/[0.03] border border-white/10 rounded-2xl pl-14 pr-6 py-5 w-full focus:outline-none focus:border-cyan transition-all text-white placeholder-slate-600 font-medium">
                        </div>
                        <div class="relative group/input">
                            <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500 group-focus-within/input:text-cyan transition-colors"></i>
                            <input type="password" id="password" placeholder="Password" required
                                class="bg-white/[0.03] border border-white/10 rounded-2xl pl-14 pr-6 py-5 w-full focus:outline-none focus:border-cyan transition-all text-white placeholder-slate-600 font-medium">
                        </div>
                    </div>
                    
                    <button type="submit" id="submit-btn" 
                        class="bg-white text-black py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl mt-4">
                        Login
                    </button>
                </form>

                <div class="flex items-center gap-6 my-10">
                    <div class="h-px flex-1 bg-white/5"></div>
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-600">OR</span>
                    <div class="h-px flex-1 bg-white/5"></div>
                </div>

                <button type="button" id="google-btn" 
                    class="flex items-center justify-center gap-4 bg-white/[0.03] border border-white/10 text-white py-5 rounded-2xl font-bold text-sm hover:bg-white/[0.08] transition-all w-full group/google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5 group-hover/google:scale-110 transition-transform">
                    Continue with Google
                </button>

                <div class="mt-12 text-center text-sm font-medium">
                    <span id="toggle-text" class="text-slate-500">New to the elite? </span>
                    <span id="toggle-btn" class="text-cyan font-black cursor-pointer hover:text-cyan-light transition-colors">Sign Up</span>
                </div>

                <div class="mt-10 pt-10 border-t border-white/5 text-center">
                    <a href="index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-white transition-colors text-[10px] font-black uppercase tracking-[0.2em] no-underline">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Return to Main Site
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authDesc = document.getElementById('auth-desc');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const googleBtn = document.getElementById('google-btn');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Welcome Back' : 'Create Account';
            authDesc.textContent = isLogin ? 'Identify yourself to access the portal' : 'Join the elite inner circle';
            submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            toggleBtn.textContent = isLogin ? 'Sign Up' : 'Login';
            document.getElementById('toggle-text').textContent = isLogin ? "New to the elite? " : "Already initiated? ";
            errorMsg.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                if (isLogin) {
                    const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    if (!user.emailVerified && email !== 'rajsimariaa@gmail.com') {
                        errorMsg.innerHTML = `Verification required. <br> <span id="resend-email" class="underline cursor-pointer font-black mt-2 inline-block">Resend email?</span>`;
                        errorMsg.classList.remove('hidden');

                        document.getElementById('resend-email').addEventListener('click', async () => {
                            await user.sendEmailVerification();
                            successMsg.textContent = "Email sent! Check your inbox.";
                            successMsg.classList.remove('hidden');
                            errorMsg.classList.add('hidden');
                        });

                        await firebase.auth().signOut();
                    } else {
                        redirectUser(email);
                    }
                } else {
                    const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                    await userCredential.user.sendEmailVerification();
                    successMsg.textContent = "Initiation email sent! Please verify.";
                    successMsg.classList.remove('hidden');
                    await firebase.auth().signOut();
                    isLogin = true;
                    authTitle.textContent = 'Welcome Back';
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            }
        });

        function redirectUser(email) {
            if (email === 'rajsimariaa@gmail.com') {
                window.location.href = 'admin.html';
            } else {
                if (localStorage.getItem('pendingPurchase')) {
                    window.location.href = 'index.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        }

        googleBtn.addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                errorMsg.classList.add('hidden');
                googleBtn.disabled = true;
                const originalContent = googleBtn.innerHTML;
                googleBtn.innerHTML = '<i class="animate-spin" data-lucide="loader-2"></i> Connecting...';
                lucide.createIcons();

                const result = await firebase.auth().signInWithPopup(provider);
                redirectUser(result.user.email);
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                googleBtn.disabled = false;
                googleBtn.innerHTML = `
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
                    Continue with Google
                `;
            }
        });

        firebase.auth().onAuthStateChanged((user) => {
            if (user && (user.emailVerified || user.email === 'rajsimariaa@gmail.com')) {
                redirectUser(user.email);
            }
        });

        lucide.createIcons();
    </script>
</body>

</html>
