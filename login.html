<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Raj Simaria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#030303',
                        card: 'rgba(15, 15, 15, 0.6)',
                        border: 'rgba(255, 255, 255, 0.08)',
                        cyan: '#22d3ee',
                        fuchsia: '#c026d3',
                        emerald: '#34d399',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(16px);
            text-align: center;
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-form input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 16px;
        }

        .auth-form input:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .auth-toggle {
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .auth-toggle span {
            color: var(--cyan);
            cursor: pointer;
            font-weight: 700;
        }

        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .success-msg {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--card-border);
        }

        .divider span {
            padding: 0 16px;
            font-weight: 600;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-muted);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 20px;
                border-radius: 24px;
            }

            .auth-header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body class="bg-dark text-white font-outfit antialiased min-h-screen">
    <div class="grid-background"></div>
    
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-card border border-border backdrop-blur-xl rounded-[2.5rem] p-10 md:p-14 w-full max-w-[480px] text-center shadow-2xl animate-in fade-in zoom-in duration-500">
            <div class="mb-10">
                <div class="text-4xl font-black tracking-tighter mb-6">
                    <span class="text-cyan">>_</span>
                    <span>RAJ<span class="text-cyan">.</span></span>
                </div>
                <h1 id="auth-title" class="text-4xl font-black tracking-tight mb-3">Welcome Back</h1>
                <p id="auth-desc" class="text-slate-400 font-medium">Login to access your dashboard</p>
            </div>

            <div id="error-msg" class="hidden text-red-500 bg-red-500/10 p-4 rounded-xl text-sm font-bold mb-6 border border-red-500/20"></div>
            <div id="success-msg" class="hidden text-emerald-500 bg-emerald-500/10 p-4 rounded-xl text-sm font-bold mb-6 border border-emerald-500/20"></div>

            <form id="auth-form" class="flex flex-col gap-4">
                <div class="space-y-4">
                    <input type="email" id="email" placeholder="Email Address" required
                        class="bg-white/5 border border-white/10 rounded-xl px-5 py-4 w-full focus:outline-none focus:border-cyan transition-all text-white placeholder-slate-600 font-medium">
                    <input type="password" id="password" placeholder="Password" required
                        class="bg-white/5 border border-white/10 rounded-xl px-5 py-4 w-full focus:outline-none focus:border-cyan transition-all text-white placeholder-slate-600 font-medium">
                </div>
                <button type="submit" id="submit-btn" 
                    class="bg-white text-black px-10 py-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg mt-2">
                    Login
                </button>
            </form>

            <div class="flex items-center gap-4 my-8 text-slate-600">
                <div class="h-px flex-1 bg-white/5"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.3em]">OR</span>
                <div class="h-px flex-1 bg-white/5"></div>
            </div>

            <button type="button" id="google-btn" 
                class="flex items-center justify-center gap-3 bg-white/5 border border-white/10 text-white px-8 py-4 rounded-2xl font-bold text-sm hover:bg-white/10 transition-all w-full">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
                Continue with Google
            </button>

            <div class="mt-8 text-sm font-medium">
                <span id="toggle-text" class="text-slate-500">Don't have an account? </span>
                <span id="toggle-btn" class="text-cyan font-bold cursor-pointer hover:underline">Sign Up</span>
            </div>

            <a href="index.html" class="inline-flex items-center gap-2 mt-8 text-slate-500 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authDesc = document.getElementById('auth-desc');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const googleBtn = document.getElementById('google-btn');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Welcome Back' : 'Create Account';
            authDesc.textContent = isLogin ? 'Login to access your dashboard' : 'Join our community today';
            submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            toggleBtn.textContent = isLogin ? 'Sign Up' : 'Login';
            document.getElementById('toggle-text').textContent = isLogin ? "Don't have an account? " : "Already have an account? ";
            errorMsg.classList.add('hidden');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                if (isLogin) {
                    const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    if (!user.emailVerified && email !== 'rajsimariaa@gmail.com') {
                        errorMsg.innerHTML = `Please verify your email before logging in. <br> <span id="resend-email" style="text-decoration:underline; cursor:pointer; font-weight:700;">Resend verification email?</span>`;
                        errorMsg.classList.remove('hidden');

                        document.getElementById('resend-email').addEventListener('click', async () => {
                            await user.sendEmailVerification();
                            successMsg.textContent = "Verification email sent!";
                            successMsg.classList.remove('hidden');
                            errorMsg.classList.add('hidden');
                        });

                        await firebase.auth().signOut();
                    } else {
                        redirectUser(email);
                    }
                } else {
                    const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                    await userCredential.user.sendEmailVerification();
                    successMsg.textContent = "Verification email sent! Please check your inbox.";
                    successMsg.classList.remove('hidden');
                    await firebase.auth().signOut();
                    isLogin = true;
                    authTitle.textContent = 'Welcome Back';
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                if (!isLogin && !successMsg.classList.contains('hidden')) {
                    submitBtn.textContent = 'Login';
                } else {
                    submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
                }
            }
        });

        function redirectUser(email) {
            if (email === 'rajsimariaa@gmail.com') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        // Google Sign In
        googleBtn.addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                errorMsg.classList.add('hidden');
                googleBtn.disabled = true;
                const originalText = googleBtn.innerHTML;
                googleBtn.innerHTML = '<i class="animate-spin" data-lucide="loader-2"></i> Connecting...';
                lucide.createIcons();

                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                redirectUser(user.email);
            } catch (error) {
                console.error("Google Auth Error:", error);
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                googleBtn.disabled = false;
                googleBtn.innerHTML = `
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="google-icon">
                    Continue with Google
                `;
            }
        });

        // Check if already logged in
        firebase.auth().onAuthStateChanged((user) => {
            if (user && (user.emailVerified || user.email === 'rajsimariaa@gmail.com')) {
                redirectUser(user.email);
            }
        });

        lucide.createIcons();
    </script>
</body>

</html>
